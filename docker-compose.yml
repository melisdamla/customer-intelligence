services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - backend-artifacts:/app/artifacts

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-data:
  backend-artifacts:
